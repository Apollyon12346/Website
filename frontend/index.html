<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <title>Budgeting Web App</title>
  </head>

  <body>
    <header class="header">
      <p class="heading-primary">Budgeting Web Application</p>
    </header>

    <main>
<section class="section-income">
        <p class="heading-secondary">Monthly Income:</p>
        <div class="income-row">
          <input type="number" id="income-input" placeholder="Enter monthly income" />
          <button class="btn" id="income-btn">Set Income</button>
        </div>
        <p id="income-display"></p>
      </section>

      <section class="section-categories">
        <div class="container grid grid--3-cols">
          <div class="category-column" data-category="bills">
            <p class="heading-secondary">Bills</p>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input
                type="number"
                placeholder="Budget"
                class="input-budget"
                min="0"
              />
            </div>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input
                type="number"
                placeholder="Budget"
                class="input-budget"
                min="0"
              />
            </div>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input
                type="number"
                placeholder="Budget"
                class="input-budget"
                min="0"
              />
            </div>
            <p class="category-total" id="total-bills">Total: $0</p>
            <p class="error-msg hidden" id="error-bills">
              Please fill in all name and budget fields.
            </p>
            <button class="btn btn-submit" data-category="bills">
              Submit Bills
            </button>
          </div>

          <div class="category-column" data-category="groceries">
            <p class="heading-secondary">Groceries</p>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input type="number" placeholder="Budget" class="input-budget" min="0" />
            </div>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input type="number" placeholder="Budget" class="input-budget" min="0" />
            </div>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input type="number" placeholder="Budget" class="input-budget" min="0" />
            </div>
            <p class="category-total" id="total-groceries">Total: $0</p>
            <p class="error-msg hidden" id="error-groceries">Please fill in all name and budget fields.</p>
            <button class="btn btn-submit" data-category="groceries">Submit Groceries</button>
          </div>

          <div class="category-column" data-category="other">
            <p class="heading-secondary">Other</p>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input type="number" placeholder="Budget" class="input-budget" min="0" />
            </div>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input type="number" placeholder="Budget" class="input-budget" min="0" />
            </div>
            <div class="expense-row">
              <input type="text" placeholder="Name" class="input-name" />
              <input type="text" placeholder="Description" class="input-desc" />
              <input type="number" placeholder="Budget" class="input-budget" min="0" />
            </div>
            <p class="category-total" id="total-other">Total: $0</p>
            <p class="error-msg hidden" id="error-other">Please fill in all name and budget fields.</p>
            <button class="btn btn-submit" data-category="other">Submit Other</button>
          </div>
        </div>
        </div>

        <section class="section-leftover">
        <div class="heading-secondary">
          <p class=>Amount Leftover:</p>
          <button class="btn" id="btn-calculate">Calculate Leftover</button>
          <p id="leftover-display"></p>
        </div>
        </section>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
